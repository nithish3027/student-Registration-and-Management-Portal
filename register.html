<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Student Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <h2>Student Portal</h2>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="students.html">Students</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="register-section">
            <div class="register-box">
                <h1>Student Registration</h1>
                <p class="register-description">Enter your details to create a student account</p>
                <form id="registerForm">
                    <div class="register-row">
                        <div class="form-group">
                            <label for="studentName">Full Name</label>
                            <input type="text" id="studentName" placeholder="Enter full name">
                        </div>
                        <div class="form-group">
                            <label for="registerNumber">Register Number</label>
                            <input type="text" id="registerNumber" placeholder="Enter register number">
                        </div>
                    </div>
                    <div class="register-row">
                        <div class="form-group">
                            <label for="studentEmail">Email</label>
                            <input type="email" id="studentEmail" placeholder="Enter email">
                        </div>
                        <div class="form-group">
                            <label for="phoneNumber">Phone Number</label>
                            <input type="tel" id="phoneNumber" placeholder="Enter phone number">
                        </div>
                    </div>
                    <div class="register-row">
                        <div class="form-group">
                            <label for="department">Department</label>
                            <select id="department">
                                <option value="">Select Department</option>
                                <option value="AI & DS">AI & DS</option>
                                <option value="CSE">CSE</option>
                                <option value="ECE">ECE</option>
                                <option value="EEE">EEE</option>
                                <option value="Mechanical">Mechanical</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="studentYear">Year</label>
                            <select id="studentYear">
                                <option value="">Select Year</option>
                                <option value="1st Year">1st Year</option>
                                <option value="2nd Year">2nd Year</option>
                                <option value="3rd Year">3rd Year</option>
                                <option value="4th Year">4th Year</option>
                            </select>
                        </div>
                    </div>
                    <div class="register-row">
                        <div class="form-group">
                            <label for="gender">Gender</label>
                            <select id="gender">
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="registerPassword">Password</label>
                            <input type="password" id="registerPassword" placeholder="Create password">
                        </div>
                    </div>
                    <button type="submit" class="register-btn">Register Student</button>
                </form>
                <p id="registerMessage"></p>
                <p class="login-text">Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Student Portal</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
