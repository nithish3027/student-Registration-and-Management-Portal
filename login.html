<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <h2>Student Portal</h2>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="students.html">Students</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="login-section">
            <div class="login-box">
                <h1>Student Login</h1>
                <p>Login to access your student portal</p>
                <form id="loginForm">
                    <div class="input-group">
                        <label for="loginRegister">Register Number</label>
                        <input type="text" id="loginRegister" placeholder="Enter register number">
                    </div>
                    <div class="input-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter password">
                    </div>
                    <button type="submit">Login</button>
                </form>
                <p id="loginMessage"></p>
                <p class="register-text">Don't have an account? <a href="register.html">Register here</a></p>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Student Portal</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
